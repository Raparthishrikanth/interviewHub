services:
  - type: web
    name: interviewhub-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    dockerCommand: python manage.py migrate && daphne -b 0.0.0.0 -p $PORT config.asgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: FRONTEND_URL
        value: https://interview-hub-eight-steel.vercel.app
      - key: ALLOWED_HOSTS
        value: "*"
