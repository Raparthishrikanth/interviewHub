<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Notice Board Announcement</title>
</head>
<body style="font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; margin: 0; padding: 40px 0; color: #1e293b;">
    <table align="center" border="0" cellpadding="0" cellspacing="0" width="600" style="background-color: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); border-collapse: collapse;">
        <!-- Header -->
        <tr>
            <td style="background: linear-gradient(135deg, #e11d48 0%, #f43f5e 100%); padding: 40px 30px; text-align: center;">
                <h1 style="color: #ffffff; margin: 0; font-size: 26px; font-weight: 700; letter-spacing: -0.025em;">Notice Board Alert</h1>
                <p style="color: #ffe4e6; margin: 5px 0 0 0; font-size: 16px;">{{ priority }} Priority Announcement</p>
            </td>
        </tr>
        <!-- Content -->
        <tr>
            <td style="padding: 40px 30px;">
                <h2 style="font-size: 20px; color: #0f172a; font-weight: 700; margin: 0 0 15px 0;">{{ title }}</h2>
                <div style="background-color: #fff1f2; border-left: 4px solid #e11d48; padding: 15px 20px; border-radius: 4px; margin-bottom: 30px;">
                    <p style="font-size: 14px; color: #475569; font-weight: 600; margin: 0 0 8px 0; text-transform: uppercase;">Category: {{ type }}</p>
                    <p style="font-size: 15px; line-height: 1.6; color: #1e293b; margin: 0; white-space: pre-wrap;">{{ body }}</p>
                </div>

                <!-- Button -->
                <table align="center" border="0" cellpadding="0" cellspacing="0" style="margin-bottom: 20px;">
                    <tr>
                        <td align="center" style="background-color: #e11d48; border-radius: 6px;">
                            <a href="{{ frontend_url }}/notices" style="display: inline-block; padding: 14px 28px; font-size: 16px; font-weight: 700; color: #ffffff; text-decoration: none;">Go to Notice Board</a>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
        <!-- Footer -->
        <tr>
            <td style="background-color: #f8fafc; padding: 25px 30px; text-align: center; border-top: 1px solid #e2e8f0; font-size: 12px; color: #94a3b8;">
                <p style="margin: 0 0 8px 0;">&copy; 2026 InterviewHub Inc. All rights reserved.</p>
                <p style="margin: 0;">This email is sent automatically. Please do not reply directly.</p>
            </td>
        </tr>
    </table>
</body>
</html>
